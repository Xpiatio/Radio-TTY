# Development: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Production:  docker compose up --build

services:
  backend:
    command: uvicorn backend.server:app --host 0.0.0.0 --port 8765 --reload
    volumes:
      - ./data:/data
      - ./backend:/app/backend
      - ./Voices:/app/Voices:ro
      - ./Models:/app/Models:ro
    environment:
      - RADIO_TTY_CONFIG=/data/config.json

  frontend:
    build:
      dockerfile: Dockerfile.dev
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - BACKEND_URL=http://backend:8765
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
