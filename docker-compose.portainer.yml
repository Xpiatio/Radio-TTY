# Radio-TTY v1.0.0 — Portainer stack (pre-built images, no source required)
#
# BEFORE DEPLOYING:
#   1. Create named volumes or bind mounts for your data, voices, and models:
#      - radio-tty-data   → persistent config, contacts, journals, voiceprints
#      - radio-tty-voices → Piper ONNX voice model files (*.onnx + *.onnx.json)
#      - radio-tty-models → faster-whisper + speaker recognition model dirs
#   2. Ensure PulseAudio is running on the host and adjust PULSE_SERVER /
#      the pulse socket path to match your system if it differs from the default.
#   3. Sound hardware access (/dev/snd) requires the host device to be present.
#      On some NAS/VM setups this may not be applicable.

services:
  backend:
    image: ghcr.io/xpiatio/radio-tty-backend:v1.0.0
    volumes:
      - radio-tty-data:/data
      - radio-tty-voices:/app/Voices:ro
      - radio-tty-models:/app/backend/Models:ro
      - /run/user/1000/pulse:/run/pulse:ro
    environment:
      - PULSE_SERVER=unix:/run/pulse/native
    devices:
      - /dev/snd:/dev/snd
    restart: unless-stopped
    networks:
      - radio
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ghcr.io/xpiatio/radio-tty-frontend:v1.0.0
    ports:
      - "80:80"
    volumes:
      - radio-tty-data:/data:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - radio

networks:
  radio:
    driver: bridge

volumes:
  radio-tty-data:
  radio-tty-voices:
  radio-tty-models:
