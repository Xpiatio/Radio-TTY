# Radio-TTY v2.4.1 — Portainer stack (pre-built images, no source required)
#
# QUICK START
# -----------
# 0. On the Docker host, populate the volumes with models and voices FIRST:
#       bash prereq.sh
#    (Download prereq.sh from https://github.com/Xpiatio/Radio-TTY/blob/master/prereq.sh
#     or check out the repo. Requires only docker — no Python needed on the host.)
#
# 1. In Portainer: Volumes → Add volume (one for each of the three below).
#    prereq.sh creates them automatically, so this step is already done if you ran it.
#
#    Volume name          | What goes inside
#    -------------------- | -----------------------------------------------
#    radio-tty-data       | Config, contacts, users, tokens, journals (auto-created on first run)
#    radio-tty-voices     | Piper ONNX voice files (*.onnx + *.onnx.json)
#    radio-tty-models     | faster-whisper model dir(s) — streaming + optional final-pass
#
#    TWO-TIER (higher RX accuracy): stage a second, larger model for the
#    full-utterance final pass alongside the streaming model:
#       bash prereq.sh --final-model distil-large-v3
#    then set whisper_model_final in the Server Config panel (or config.json).
#    It lazy-loads on the first finalized utterance and adds ~1.5 GB RAM only
#    while active — keep that in mind for any backend memory limit you set.
#
# 2. Set PULSE_UID to your host user's UID (run 'id -u' on the host to check).
#    The default below is 1000. In Portainer: Stack → Environment variables → add PULSE_UID.
#    Or edit the volume line directly:  - /run/user/<YOUR_UID>/pulse:/run/pulse:ro
#
# 3. Stacks → Add stack → Web editor → paste this file → Deploy.
#
# FIRST RUN
# ---------
# Visit http://<host-ip> — you'll see the Setup screen to create the admin account.
# Or set RADIO_TTY_ADMIN_PASS on the backend service to bootstrap headlessly:
#   environment:
#     - RADIO_TTY_ADMIN_PASS=your-initial-password
# Remove that variable after first startup; the account is persisted in the data volume.
#
# UPDATING
# --------
# Pull new images (change the tag below), then in Portainer: open the stack → Update.
#
# CUDA (GPU) VARIANT
# ------------------
# If the host has an NVIDIA GPU, swap the backend image tag to the -cuda suffix:
#   image: ghcr.io/xpiatio/radio-tty-backend:v2.4.1-cuda
# The CUDA image uses onnxruntime-gpu for accelerated Whisper inference.
# Requires the NVIDIA Container Toolkit on the host and the `deploy` section:
#   deploy:
#     resources:
#       reservations:
#         devices:
#           - driver: nvidia
#             count: 1
#             capabilities: [gpu]

services:
  backend:
    image: ghcr.io/xpiatio/radio-tty-backend:v2.4.1
    volumes:
      - radio-tty-data:/data
      - radio-tty-voices:/app/Voices:ro
      - radio-tty-models:/app/backend/Models:ro
      - /run/user/${PULSE_UID:-1000}/pulse:/run/pulse:ro
    environment:
      - PULSE_SERVER=unix:/run/pulse/native
      # Uncomment to create the admin account headlessly on first run:
      # - RADIO_TTY_ADMIN_PASS=change-me
    devices:
      - /dev/snd:/dev/snd
    restart: unless-stopped
    networks:
      - radio
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ghcr.io/xpiatio/radio-tty-frontend:v2.4.1
    ports:
      - "80:8080"
    volumes:
      - radio-tty-data:/data:ro
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - radio

networks:
  radio:
    driver: bridge

volumes:
  radio-tty-data:
  radio-tty-voices:
  radio-tty-models:

# TO ADD MORE VOICES AFTER DEPLOY:
#   Re-run prereq.sh with the --voice-only flag:
#       bash prereq.sh --voice-only
#
#   Or copy a .onnx + .onnx.json pair directly into the volume:
#       docker run --rm \
#         -v radio-tty-voices:/v \
#         -v "$(pwd):/src" \
#         alpine cp /src/myvoice.onnx /src/myvoice.onnx.json /v/
#
#   Browse available Piper voices: https://huggingface.co/rhasspy/piper-voices
