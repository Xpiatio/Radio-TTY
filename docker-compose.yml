services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        COMPUTE_BACKEND: cpu
    volumes:
      - ./data:/data
      - ./Voices:/app/Voices:ro
      - ./Models:/app/backend/Models:ro
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse:/run/pulse:ro
    environment:
      - PULSE_SERVER=unix:/run/pulse/native
    devices:
      - /dev/snd:/dev/snd
    restart: unless-stopped
    networks:
      - radio
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./data/public:/usr/share/nginx/html/public:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - radio

networks:
  radio:
    driver: bridge
