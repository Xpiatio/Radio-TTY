server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Public family journal — served directly from shared data volume, no auth required
    location = /journal {
        alias /usr/share/nginx/html/public/journal.html;
        add_header Cache-Control "no-cache, must-revalidate";
        default_type text/html;
        try_files /public/journal.html =404;
    }

    # WebSocket proxy to backend
    location /ws {
        proxy_pass http://backend:8765/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Auth API proxy to backend
    location /auth/ {
        proxy_pass http://backend:8765/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static files; fall back to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
