# Main nginx configuration for the Radio-TTY frontend container.
#
# Overrides the base image's nginx.conf to pin worker_processes to a fixed
# count. The base image uses 'worker_processes auto', which sets one worker
# per CPU core. On high-core-count hosts this exhausts shared-memory/
# semaphore limits inside the unprivileged container, causing nginx to hang
# while spawning its final worker process.
#
# The temp paths below are required for nginx-unprivileged (non-root).

worker_processes  4;

error_log  /var/log/nginx/error.log notice;
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    proxy_temp_path       /tmp/proxy_temp;
    client_body_temp_path /tmp/client_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;

    keepalive_timeout 65;

    include /etc/nginx/conf.d/*.conf;
}
